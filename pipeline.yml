name: 🧠 AQI Feature Pipeline

on:
  schedule:
    - cron: '0 * * * *'       # every hour  (tweak as needed)
  workflow_dispatch:           # manual trigger
  push:
    branches: [ main ]
    paths:
      - 'stage*.py'
      - 'run_pipeline.py'
      - 'requirements.txt'
      - '.github/workflows/pipeline.yml'

jobs:
  feature-pipeline:
    name: Run Feature Pipeline
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 10           # need history for lag feature continuity

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      # Restore persisted SQLite DB from cache (for lag features)
      - name: 💾 Restore feature DB cache
        uses: actions/cache@v4
        with:
          path: data/features.db
          key: features-db-${{ github.run_number }}
          restore-keys: features-db-

      - name: 🚀 Run Feature Pipeline (all 3 stages)
        run: python run_pipeline.py
        env:
          CITY:              ${{ vars.CITY }}
          LATITUDE:          ${{ vars.LATITUDE }}
          LONGITUDE:         ${{ vars.LONGITUDE }}
          AQICN_TOKEN:       ${{ secrets.AQICN_TOKEN }}
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT: ${{ vars.HOPSWORKS_PROJECT }}
          PYTHONUNBUFFERED:  "1"

      - name: 💾 Commit data to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m \
            "🧠 Feature pipeline run: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output-${{ github.run_number }}
          path: |
            data/features/
            data/features_store_backup/
            data/pipeline.log
          retention-days: 14

      - name: ❌ On failure
        if: failure()
        run: echo "Pipeline failed. Check logs above."
